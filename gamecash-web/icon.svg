  <path d="M376 180H136c-39.7 0-72 32.3-72 72v48c0 39.7 32.3 72 72 72h240c39.7 0 72-32.3 72-72v-48c0-39.7-32.3-72-72-72zm-184 104h-24v24c0 6.6-5.4 12-12 12s-12-5.4-12-12v-24h-24c-6.6 0-12-5.4-12-12s5.4-12 12-12h24v-24c0-6.6 5.4-12 12-12s12 5.4 12 12v24h24c6.6 0 12 5.4 12 12s-5.4 12-12 12zm160-4c-11 0-20-9-20-20s9-20 20-20 20 9 20 20-9 20-20 20zm32 32c-11 0-20-9-20-20s9-20 20-20 20 9 20 20-9 20-20 20z" fill="url(#accent-grad)" style="filter: drop-shadow(0px 0px 15px rgba(0, 210, 255, 0.6));"/>
